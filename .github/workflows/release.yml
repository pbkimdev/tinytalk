name: release
# Build the self-contained `tt` binary for macOS + Linux (arm64/x86_64) and
# publish them as release assets. Push a tag (v*) to cut a release; the
# curl installer (install.sh) downloads these assets — no Python/uv on the
# user's machine.
#
# The heavy backends ride as separate, checksummed add-on assets that `tt auth`
# downloads on demand: `tt-bedrock-addon.tar.gz` (cross-platform, no token) and
# per-platform `tt-claude-addon-<platform>.tar.gz`. The base binary ships
# without boto3/botocore and without the 220 MB claude_agent_sdk/_bundled/claude.
#
# Reproducibility note: the build syncs from uv.lock (`--frozen`). This is
# load-bearing — the project allows prereleases (for openai-codex), and a loose
# resolve pulls httpx 1.0.dev (an incompatible API rewrite) instead of the
# locked 0.28.x. Always build from the lock.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            asset: tt-macos-arm64
            platform: macos-arm64
          - os: ubuntu-24.04
            asset: tt-linux-x86_64
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            asset: tt-linux-arm64
            platform: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync locked deps (codex extra only)
        run: uv sync --frozen --extra codex

      - name: Assert tag matches baked version
        run: |
          want="v$(uv run python -c 'import tinytalk; print(tinytalk.__version__)')"
          got="${{ inputs.tag || github.ref_name }}"
          test "$want" = "$got" || { echo "tag $got != $want"; exit 1; }

      - name: Build standalone binary
        run: |
          uv run --with pyinstaller pyinstaller --onedir --name tt --clean --noconfirm \
            --collect-submodules tinytalk \
            --add-data "tinytalk/shell/tt.zsh:tinytalk/shell" \
            --collect-all httpx --collect-all httpcore --collect-all certifi \
            --collect-all anyio --collect-all h11 \
            --collect-all keyring \
            --collect-all questionary --collect-all prompt_toolkit \
            --collect-submodules claude_agent_sdk --collect-all openai_codex \
            --exclude-module boto3 --exclude-module botocore --exclude-module s3transfer \
            packaging/tt_entry.py

      - name: Smoke-test the binary
        run: |
          # --onedir: `tt` is a directory (launcher + _internal/ libs) that runs
          # WITHOUT the per-launch self-extraction a --onefile bundle pays (~0.06s
          # cold start vs several seconds), which is what the ? recall widget needs.
          ./dist/tt/tt --version
          ./dist/tt/tt init zsh >/dev/null
          ./dist/tt/tt --help >/dev/null
          if find dist/tt/_internal \( -iname 'boto3*' -o -iname 'botocore*' -o -path '*/_bundled/claude' \) 2>/dev/null | grep -q .; then
            echo 'FAIL: excluded backend present'; exit 1
          fi
          kb=$(du -sk dist/tt | cut -f1); test "$kb" -lt 61440   # < ~60 MB unpacked (base, no heavy backends)

      - name: Stage base binary
        shell: bash
        run: |
          mkdir -p out
          tar -C dist -czf "out/${{ matrix.asset }}.tar.gz" tt

      - name: Build Claude add-on
        shell: bash
        run: |
          # claude_agent_sdk (a core dep, with its _bundled/claude) is already in .venv
          # from the base build's `uv sync` — no re-sync needed.
          CLAUDE=$(uv run python -c "import importlib.util,pathlib;print(pathlib.Path(importlib.util.find_spec('claude_agent_sdk').origin).parent/'_bundled'/'claude')")
          install -m 0755 "$CLAUDE" dist/claude
          tar -C dist -czf "out/tt-claude-addon-${{ matrix.platform }}.tar.gz" claude

      - name: Checksum every asset
        shell: bash
        run: |
          cd out
          for f in *; do
            case "$f" in *.sha256) continue;; esac
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/*

  build-bedrock-addon:
    name: build tt-bedrock-addon
    runs-on: ubuntu-24.04     # pure-Python: one cross-platform asset, isolated venv
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Sync locked deps (bedrock extra, isolated from the base binary)
        run: uv sync --frozen --extra bedrock

      - name: Vendor the bedrock add-on tree
        shell: bash
        run: |
          uv run python - <<'PY'
          import importlib.util, pathlib, shutil
          dst = pathlib.Path("dist/addon-bedrock"); dst.mkdir(parents=True, exist_ok=True)
          for m in ("boto3","botocore","s3transfer","jmespath","dateutil","urllib3","six"):
              src = pathlib.Path(importlib.util.find_spec(m).origin)
              src = src.parent if src.name == "__init__.py" else src   # six is a single module
              (shutil.copytree(src, dst/src.name) if src.is_dir() else shutil.copy2(src, dst/src.name))
          PY
          mkdir -p out
          tar -C dist/addon-bedrock -czf out/tt-bedrock-addon.tar.gz .

      - name: Checksum every asset
        shell: bash
        run: |
          cd out
          for f in *; do
            case "$f" in *.sha256) continue;; esac
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tt-bedrock-addon
          path: out/*

  release:
    name: publish release
    needs: [build, build-bedrock-addon]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          # An rc tag must not become "Latest" — the unpinned installer serves latest.
          prerelease: ${{ contains(inputs.tag || github.ref_name, 'rc') }}
