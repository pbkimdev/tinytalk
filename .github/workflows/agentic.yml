name: agentic
# Thin caller — copy this to a project's .github/workflows/agentic.yml.
# All the logic lives in pbkimdev/agentic-workflows; during dev we track @main (a moving ref).

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]            # fires for issue AND PR comments (slash-commands)
  pull_request:
    types: [labeled]            # stage-2 phases (plan/implement/review/docs) run on the PR
  pull_request_review:
    types: [submitted]          # a human submitting a PR review re-triggers the review phase
  pull_request_review_comment:
    types: [created]            # a human inline diff comment re-triggers the review phase

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pipeline:
    # Bot reviews (Bugbot, etc.) fire pull_request_review* events but aren't human
    # @claude triggers — calling the reusable workflow on them fails instantly.
    if: >-
      ${{
        (github.event_name != 'pull_request_review' || github.event.review.user.type != 'Bot') &&
        (github.event_name != 'pull_request_review_comment' || github.event.comment.user.type != 'Bot')
      }}
    uses: pbkimdev/agentic-workflows/.github/workflows/dispatch.yml@main
    secrets: inherit
