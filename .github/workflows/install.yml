name: install
# End-to-end proof that install.sh works on a fresh machine: Linux + macOS,
# zsh and bash users, isolated HOME. Builds the standalone binary the release
# ships, then feeds it to the installer via TT_BINARY (no published release
# needed) and asserts install, PATH + widget wiring, idempotency, and that the
# CLI answers from a fresh interactive shell.

on:
  push:
    branches: [main]
    paths: [install.sh, packaging/**, pyproject.toml, uv.lock, tinytalk/**, tests/test_install.py, .github/workflows/install.yml]
  pull_request:
    paths: [install.sh, packaging/**, pyproject.toml, uv.lock, tinytalk/**, tests/test_install.py, .github/workflows/install.yml]
  workflow_dispatch:

jobs:
  unit:
    name: install unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Run installer unit tests
        run: |
          uv sync --frozen --group dev
          uv run pytest tests/test_install.py -q

  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        shell: [zsh, bash]
        include:
          - shell: zsh
            rcfile: .zshrc
          - shell: bash
            rcfile: .bashrc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install zsh (Linux)
        if: runner.os == 'Linux' && matrix.shell == 'zsh'
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Build the standalone bundle (from the lock)
        # --frozen is load-bearing: a loose resolve pulls httpx 1.0.dev (an
        # incompatible API) instead of the locked 0.28.x. Mirrors release.yml.
        # --onedir + tar: install.sh downloads and `tar -xzf`s a onedir bundle, so
        # the installer test must feed it that tarball via TT_BINARY — not a raw
        # --onefile executable (which install.sh would try to untar and reject).
        run: |
          uv sync --frozen --extra bedrock --extra codex
          uv run --with pyinstaller pyinstaller --onedir --name tt --clean --noconfirm \
            --collect-submodules tinytalk \
            --add-data "tinytalk/shell/tt.zsh:tinytalk/shell" \
            --collect-all httpx --collect-all httpcore --collect-all certifi \
            --collect-all anyio --collect-all h11 \
            --collect-all keyring \
            --collect-all questionary --collect-all prompt_toolkit \
            --collect-all claude_agent_sdk --collect-all openai_codex \
            --collect-all boto3 --collect-all botocore \
            packaging/tt_entry.py
          tar -C dist -czf "$PWD/tt-bundle.tar.gz" tt
      - name: Run installer into a fresh HOME
        # XDG_CONFIG_HOME pinned inside FAKEHOME — the runner exports its own,
        # which would (correctly) pull the config out of the sandbox. SHELL drives
        # which rc file the PATH block lands in. TT_BINARY skips the download.
        run: |
          FAKEHOME="$RUNNER_TEMP/tt-home"
          mkdir -p "$FAKEHOME"
          echo "FAKEHOME=$FAKEHOME" >> "$GITHUB_ENV"
          HOME="$FAKEHOME" XDG_CONFIG_HOME="$FAKEHOME/.config" \
            SHELL="/bin/${{ matrix.shell }}" TT_BINARY="$PWD/tt-bundle.tar.gz" ./install.sh --yes
      - name: Assert config scaffold and rc wiring (each block exactly once)
        run: |
          cat "$FAKEHOME/${{ matrix.rcfile }}"
          test -f "$FAKEHOME/.config/tinytalk/config.toml"
          [ "$(grep -cF '# tt PATH (added by install.sh)' "$FAKEHOME/${{ matrix.rcfile }}")" -eq 1 ]
          [ "$(grep -cF '# tt zsh integration (added by install.sh)' "$FAKEHOME/.zshrc")" -eq 1 ]
      - name: Re-run installer — must change nothing
        run: |
          cp "$FAKEHOME/${{ matrix.rcfile }}" "$RUNNER_TEMP/rc.before"
          HOME="$FAKEHOME" XDG_CONFIG_HOME="$FAKEHOME/.config" \
            SHELL="/bin/${{ matrix.shell }}" TT_BINARY="$PWD/tt-bundle.tar.gz" ./install.sh --yes
          diff "$RUNNER_TEMP/rc.before" "$FAKEHOME/${{ matrix.rcfile }}"
      - name: CLI works from a fresh interactive shell
        run: |
          HOME="$FAKEHOME" XDG_CONFIG_HOME="$FAKEHOME/.config" \
            ${{ matrix.shell }} -ic 'tt --version && tt --help >/dev/null && tt init zsh >/dev/null && echo SHELL_OK'
