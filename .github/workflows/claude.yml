name: Claude

# How work gets triggered
#  - Add the `plan` label to an issue   -> Claude posts an implementation plan as a comment and stops.
#    Review it, then:
#  - Add the `claude` label to an issue -> Claude implements it (per the plan, if one was posted).
#      * Parent issue  => resolve its sub-issues in the order they're listed, one commit each.
#      * Leaf issue    => just resolve that issue.
#      * Add the `ultra` label FIRST (before `claude`) => heavy multi-agent (ultracode) lane.
#  - Mention @claude in an issue/PR comment or a review comment -> Claude addresses it
#    (the review -> fix loop).
#
# Setup: GitHub app installed and authenticated via the CLAUDE_CODE_OAUTH_TOKEN secret (done).
# Labels in this repo: `plan` (propose), `claude` (build), `ultra` (heavy-lane modifier).
#
# Model IDs below are current as of this session (Opus 4.8 / Sonnet 4.6); confirm they're
# available on your account/plan and adjust if needed.

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # --- `plan` label added: post an implementation plan as a comment, no code ---
  plan:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'plan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Post an implementation plan for issue #${{ github.event.issue.number }} in
            ${{ github.repository }} as a single issue comment. Do NOT write code, create a
            branch, or open a PR.

            Cover:
            - The approach, and the files/packages you'll add or change.
            - If the issue has sub-issues
              (gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/sub_issues),
              the order you'll resolve them in — one commit each.
            - How each unit will be verified against its "done when…"/acceptance checks.
            - Open questions or risks, if any.

            Keep it concise. Conventions are in AGENTS.md.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 10
            --allowedTools "Read,Glob,Grep,Bash(gh:*)"

  # --- Review -> fix loop & ad-hoc help: @claude mentions ---
  mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash"

  # --- `claude` label added, no `ultra` label: standard single-agent lane (Version A) ---
  label-standard:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'claude' &&
      !contains(github.event.issue.labels.*.name, 'ultra')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Resolve issue #${{ github.event.issue.number }} in ${{ github.repository }}.

            If an implementation plan has been posted as a comment on this issue, follow it.

            Ordering — do this deterministically, in this order:
            1. Fetch this issue's sub-issues:
                 gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/sub_issues
               If it HAS sub-issues, resolve them ONE AT A TIME, in the order returned.
               If it has NONE, resolve this issue directly.
            2. Work on a new branch. Make exactly ONE commit per sub-issue (one commit total if
               there are no sub-issues); name the unit it closes in each commit message.
            3. After each unit, verify its "done when…"/acceptance checks before starting the next.
               If a unit's checks cannot pass, STOP, comment what's blocking, and do not continue.
            4. When everything passes, open a PR to main (gh pr create) summarizing each unit.

            Conventions are in AGENTS.md. Never auto-run shell commands the product itself generates.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash"

  # --- `claude` label added WITH `ultra` label present: heavy multi-agent lane ---
  label-ultra:
    if: >
      github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'claude' &&
      contains(github.event.issue.labels.*.name, 'ultra')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            ultracode: Resolve issue #${{ github.event.issue.number }} in ${{ github.repository }} thoroughly.

            If an implementation plan has been posted as a comment on this issue, follow it.

            Decompose the issue (and its sub-issues, in the order returned by
              gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/sub_issues)
            across subagents. Implement, then adversarially self-review and verify EACH unit against
            its acceptance checks before it lands. One commit per sub-issue. Stop and comment if a
            unit cannot pass its checks. Open a PR to main when complete, summarizing each unit.

            Conventions are in AGENTS.md. Never auto-run shell commands the product itself generates.
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash"
